version: 2
updates:
  - package-ecosystem: "docker"
    directories:
      - "/scraper"
      - "/api"
      - "/webui"
      - "/alerts"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
      - "auto-merge"

  - package-ecosystem: "pip"
    directories:
      - "/scraper"
      - "/api"
      - "/webui"
      - "/alerts"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
      - "auto-merge"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    labels:
      - "dependencies"
      - "auto-merge"
