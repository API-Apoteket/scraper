# .github/dependabot.yml - FIXED VERSION
version: 2
updates:
  # ============================================
  # DOCKER - Alla uppdateringar (veckovis + säkerhet automatiskt)
  # ============================================
  - package-ecosystem: "docker"
    directories:
      - "/scraper"
      - "/api"
      - "/webui"
      - "/alerts"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Europe/Stockholm"
    open-pull-requests-limit: 5  # Öka limit för att tillåta säkerhets-PRs
    commit-message:
      prefix: "docker"
      include: "scope"
    labels:
      - "dependencies"
      - "docker"
      - "auto-merge"
    groups:
      all-docker:
        patterns:
          - "*"
      docker-security:
        applies-to: security-updates
        patterns:
          - "*"
    target-branch: "main"

  # ============================================
  # PYTHON/PIP - Alla uppdateringar (veckovis + säkerhet automatiskt)
  # ============================================
  - package-ecosystem: "pip"
    directories:
      - "/scraper"
      - "/api"
      - "/webui"
      - "/alerts"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Europe/Stockholm"
    open-pull-requests-limit: 5  # Öka limit för säkerhets-PRs
    versioning-strategy: increase-if-necessary
    commit-message:
      prefix: "pip"
      include: "scope"
    labels:
      - "dependencies"
      - "python"
      - "auto-merge"
    groups:
      all-python:
        patterns:
          - "*"
      python-security:
        applies-to: security-updates
        patterns:
          - "*"
    ignore:
      - dependency-name: "playwright"
        versions: [">=1.41.0"]
    target-branch: "main"

  # ============================================
  # GITHUB ACTIONS - Månadsvis
  # ============================================
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
      day: "monday"
      time: "09:00"
      timezone: "Europe/Stockholm"
    open-pull-requests-limit: 1
    commit-message:
      prefix: "ci"
      include: "scope"
    labels:
      - "dependencies"
      - "ci"
      - "github-actions"
      - "auto-merge"
    groups:
      all-actions:
        patterns:
          - "*"
    target-branch: "main"

registries:
  docker-hub:
    type: docker-registry
    url: https://registry.hub.docker.com
    username: ${{ secrets.DOCKERHUB_USERNAME }}
    password: ${{ secrets.DOCKERHUB_TOKEN }}
