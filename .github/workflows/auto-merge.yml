# .github/workflows/auto-merge.yml
name: Dependabot Auto-Merge

on:
  pull_request:
    types: [opened, synchronize, reopened, labeled]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  checks: read

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    if: |
      github.actor == 'dependabot[bot]' &&
      contains(github.event.pull_request.labels.*.name, 'auto-merge') &&
      github.event.pull_request.state == 'open' &&
      github.event.pull_request.draft == false
    steps:
      - name: Fetch Dependabot metadata
        id: metadata
        uses: dependabot/fetch-metadata@v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Check mergeability
        run: |
          MERGEABLE=$(gh pr view "$PR_URL" --json mergeable -q '.mergeable')
          MERGE_STATE=$(gh pr view "$PR_URL" --json mergeStateStatus -q '.mergeStateStatus')
          echo "Merge state: $MERGE_STATE"
          if [ "$MERGEABLE" = "CONFLICTING" ]; then
            echo "❌ PR has conflicts, cannot auto-merge"
            exit 1
          fi
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Wait for required checks
        run: |
          echo "⏳ Waiting for status checks..."
          gh pr checks "$PR_URL" --watch --interval 15 --required 2>/dev/null || true
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

      - name: Approve PR
        run: gh pr review --approve "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GITHUB_TOKEN: ${{ secrets.GHCR_TOKEN }}

      - name: Enable auto-merge
        run: |
          gh pr merge --auto --delete-branch --squash "$PR_URL"
          echo "✅ Auto-merge aktiverat"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
