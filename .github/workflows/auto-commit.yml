name: Auto Commit README

on:
  push:
    paths:
      - 'README.md'
  workflow_dispatch:

jobs:
  commit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Check and amend commit message
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          COMMIT_MSG=$(git log -1 --pretty=%B)
          
          if echo "$COMMIT_MSG" | grep -qE "docs:|update README|badges"; then
            echo "Commit message already descriptive, skipping amend"
          else
            git commit --amend -m "docs: update README with dynamic badges [skip ci]"
            git push --force-with-lease
          fi
