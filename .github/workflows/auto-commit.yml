# .github/workflows/auto-commit.yml
name: Validate Commit Messages

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  validate:
    runs-on: ubuntu-latest
    # Kör ej för Dependabot – dess commits följer redan conventionalcommits
    if: github.actor != 'dependabot[bot]'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check conventional commit format
        run: |
          COMMIT_MSG=$(git log -1 --pretty=%B)
          echo "Commit: $COMMIT_MSG"

          if echo "$COMMIT_MSG" | grep -qE "^(feat|fix|docker|pip|ci|docs|chore|refactor|test|perf)(\(.+\))?: .+"; then
            echo "✅ Commit message follows conventional commits"
          else
            echo "❌ Commit message does not follow conventional commits format"
            echo "   Expected: type(scope): description"
            echo "   Types: feat, fix, docker, pip, ci, docs, chore, refactor, test, perf"
            exit 1
          fi
