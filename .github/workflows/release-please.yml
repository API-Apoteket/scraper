# .github/workflows/release-please.yml
# OBS: Denna fil är redundant om auto-release.yml används.
# Rekommendation: radera denna och behåll enbart auto-release.yml.
#
# Om du vill behålla en enda release-fil, använd denna istället
# och radera auto-release.yml:

name: Release Please

on:
  push:
    branches:
      - main
    paths-ignore:
      - '**.md'
      - '.github/**'
      - '!.github/workflows/release-please.yml'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    steps:
      - uses: googleapis/release-please-action@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          config-file: .github/release-please-config.json
          manifest-file: .github/.release-please-manifest.json
