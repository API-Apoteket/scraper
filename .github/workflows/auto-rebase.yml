# .github/workflows/auto-rebase.yml
name: Auto-Rebase Dependabot PRs

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  rebase:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Find open Dependabot PRs
        id: find-prs
        uses: actions/github-script@v7
        with:
          script: |
            const { data: prs } = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open'
            });

            const rebaseable = prs
              .filter(pr =>
                pr.user.login === 'dependabot[bot]' &&
                pr.labels.some(l => l.name === 'auto-merge' || l.name === 'auto-rebase')
              )
              .map(pr => pr.number);

            console.log(`Found ${rebaseable.length} PR(s) to rebase`);
            return rebaseable;

      - name: Rebase PRs
        uses: actions/github-script@v7
        with:
          script: |
            const prNumbers = ${{ steps.find-prs.outputs.result }};

            for (const prNumber of prNumbers) {
              try {
                await github.rest.pulls.updateBranch({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  pull_number: prNumber
                });
                console.log(`✅ Rebased PR #${prNumber}`);
              } catch (error) {
                console.log(`⚠️ Could not rebase PR #${prNumber}: ${error.message}`);
              }
            }
